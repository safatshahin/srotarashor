<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Srotar Ashor</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/events.css">
</head>
<body>
    <div id="site-nav"></div>

    <!-- Events Header -->
    <div class="events-header">
        <h1 class="events-title">Our Events</h1>
        <p class="events-subtitle bengali-text">আমাদের অনুষ্ঠানসমূহ</p>
        <p class="events-description">
            Celebrating Bengali culture and music through memorable events and performances in Melbourne, Australia
        </p>
    </div>

    <!-- Featured Upcoming Event -->
    <section class="featured-upcoming-section" id="featuredUpcoming" hidden>
        <div id="featuredUpcomingContainer"></div>
    </section>

    <!-- Filter Navigation -->
    <div class="filter-nav" id="filterNav"></div>

    <!-- Events Grid -->
    <div class="events-grid" id="eventsGrid">
        <div class="loading">Loading events...</div>
    </div>

    <div id="site-footer"></div>

    <script src="js/common.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
