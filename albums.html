<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Albums - Srotar Ashor</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/albums.css">
</head>
<body>
    <div id="site-nav"></div>

    <main style="padding-top: 5rem;">
        <section class="text-center py-16 px-6">
            <h1 class="text-5xl md:text-7xl font-bold text-white mb-4 bg-gradient-to-r from-orange-400 to-orange-600 bg-clip-text text-transparent fade-in">
                Photo Albums
            </h1>
            <p class="bengali-text text-3xl md:text-4xl text-orange-300 mb-6 fade-in">ছবির অ্যালবাম</p>
            <p class="text-xl text-gray-300 max-w-3xl mx-auto leading-relaxed fade-in">
                Journey through our years of cultural celebrations, preserved in memories and photographs. Each year tells a story of music, tradition, and community.
            </p>
        </section>

        <section class="year-nav" id="yearNav">
            <button class="year-btn active" data-year="all">All Years</button>
        </section>

        <section class="album-grid" id="albumsGrid"></section>
    </main>

    <!-- Photo Gallery Modal -->
    <div class="photo-gallery-modal" id="photoGalleryModal">
        <div class="gallery-header">
            <button class="gallery-close" onclick="closePhotoGallery()">&times;</button>
            <h2 class="gallery-title" id="galleryTitle">Album Photos</h2>
            <p class="gallery-subtitle bengali-text" id="gallerySubtitle">ছবির অ্যালবাম</p>
        </div>
        <div class="gallery-content">
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>

    <!-- Single Photo Lightbox -->
    <div class="photo-lightbox" id="photoLightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
            <img class="lightbox-image" id="lightboxImage" src="" alt="">
        </div>
    </div>

    <div id="site-footer"></div>

    <script src="js/common.js"></script>
    <script src="js/albums.js"></script>
</body>
</html>
